services:
  postgres:
    container_name: cine_db_container
    image: postgres:15
    environment:
      POSTGRES_USER: cine_user
      POSTGRES_PASSWORD: cine_password
      POSTGRES_DB: cine_db
    ports:
      - "5434:5432"
    volumes:
      - cine_v2_el_bueno_data:/var/lib/postgresql/data
    restart: always

volumes:
  cine_v2_el_bueno_data:
