spring.application.name=Cine_V2
server.port=8081

# Database Configuration (H2 in-memory for easy testing)
# spring.datasource.url=jdbc:h2:mem:cine_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
# spring.datasource.driverClassName=org.h2.Driver
