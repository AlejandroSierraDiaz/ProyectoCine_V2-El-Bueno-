# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Database Configuration (Docker PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/cine_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=cine_user
spring.datasource.password=cine_password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate & JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Security
jwt.secret=MiClaveSuperSecretaCineV2ConMasDeTreintaYDosCaracteres
jwt.expiration=3600000
